            --accent-color: #D4AF37;    /* 烫金色 */

        /* 响应式导航栏 */
        .navbar {
            background: var(--secondary-color);
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .nav-links {
            display: flex;
            justify-content: space-around;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-family: '方正清刻本悦宋', serif;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
        }
        .nav-links a:hover {
            background: var(--primary-color);

        }
        /* 动态Banner */
        .banner {
            height: 80vh;
            margin-top: 60px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),

            display: flex;
            align-items: center;
            justify-content: center;
            animation: bannerSlide 15s infinite;
        }
        @keyframes bannerSlide {

        }
        /* 产品网格布局 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

            padding: 2rem;
        }
        .product-card {
            border: 1px solid var(--primary-color);

        .ar-section {
            background: var(--secondary-color);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .ar-button {
            background: var(--accent-color);
            padding: 1rem 2rem;

    </style>




</head>

            <button class="cta-button">立即探索 →</button>
        </div>
    </section>
    <!-- 核心产品展示 -->
    <section class="product-grid" id="products">
        <div class="product-card">
            <img src="blind-box.jpg" srcset="/img/loading.gif" lazyload alt="药材盲盒" style="width:100%">
            <div class="product-info">
                <h3>药王盲盒系列</h3>
                <p>预售转化率超15%</p>
                <button class="buy-button">立即拼团</button>

        </div>

    </section>
    <!-- AR体验区块 -->
    <section class="ar-section" id="ar">
        <h2>AR识药实验室</h2>
        <div class="ar-button" onclick="startAR()">
            点击开启AR扫描
        </div>
    </section>
    <script>
        // 动态加载产品数据
        function loadProducts() {
            fetch('/api/products')
                .then(response => response.json())
                .then(data => {
                    const grid = document.querySelector('.product-grid');
                    data.forEach(product => {
                        grid.appendChild(createProductCard(product));
                    });
                });
        }
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" srcset="/img/loading.gif" lazyload alt="${product.name}">
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <span>¥${product.price}</span>
            `;
            return card;
        }
        // AR功能初始化
        function startAR() {
            if (navigator.xr) {
                // XR设备支持代码
            } else {
                alert('请使用支持AR功能的移动设备访问');
            }
        }
        // 页面加载完成后执行
        window.addEventListener('load', () => {
            loadProducts();
            // 其他初始化代码...
        });
    </script>
